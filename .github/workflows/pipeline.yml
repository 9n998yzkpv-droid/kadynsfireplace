name: Data Pipeline + Deploy

on:
  schedule:
    # Daily at 21:30 UTC — ~30 min after US market close (4:00 PM ET = 21:00 UTC)
    - cron: '30 21 * * 1-5'

    # Optional: uncomment to also refresh hourly during market hours (M-F 14:30–21:00 UTC)
    # - cron: '0 14-21 * * 1-5'

  workflow_dispatch:   # manual trigger from GitHub Actions UI
    inputs:
      force_sample:
        description: 'Use sample data even if holdings are filled in'
        required: false
        default: 'false'

# Only one pipeline run at a time (prevents race conditions writing data.json)
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run data pipeline
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python pipeline/run.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          # Only commit if file changed (idempotent)
          git diff --staged --quiet || git commit -m "chore: update portfolio data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main   # pick up the data.json commit from the pipeline job

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Sets the Next.js basePath so assets resolve correctly on GitHub Pages
          # e.g. https://user.github.io/financeblog/ → basePath="/financeblog"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
