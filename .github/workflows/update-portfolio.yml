name: Update Portfolio Data

on:
  schedule:
    # Weekdays at 4:35 PM ET (20:35 UTC standard, 21:35 UTC during DST)
    # Using 21:35 UTC to cover the more common DST period
    - cron: '35 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run portfolio pipeline
        run: python pipeline/run.py

      # When the projects portion launches (PROJECTS_ENABLED=true in
      # src/lib/flags.ts), re-enable the EF dataset refresh:
      #   - name: Bake efficient-frontier dataset
      #     run: python pipeline/ef_universe.py
      # ...and add public/ef-data.json to the `git add` below.

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "Update portfolio data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
